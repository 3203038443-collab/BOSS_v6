<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>BOSS直聘测试页</title></head>
<body>
<div id="app">
  <!-- 左侧候选人面板 (模仿BOSS直聘的React结构) -->
  <div class="chat-list" style="position:fixed;left:0;top:0;width:360px;height:100%;background:#f5f5f5;overflow-y:auto">
    <div class="list-item" data-id="123"><div><strong>张三</strong></div><div style="color:#999">您好，看到您对这个岗位感兴趣</div><span class="badge">3</span></div>
    <div class="list-item" data-id="456"><div><strong>李四</strong></div><div style="color:#999">方便发一份简历过来吗？</div></div>
    <div class="list-item" data-id="789"><div><strong>王五</strong></div><div style="color:#999">看了您的简历，觉得挺适合</div><span class="badge">1</span></div>
    <div class="list-item" data-id="101"><div><strong>赵六</strong></div><div style="color:#999">感谢您的关注</div></div>
    <div class="list-item" data-id="202"><div><strong>小明</strong></div><div style="color:#999">您好，之前有给您发过消息</div></div>
    <div class="list-item" data-id="303"><div><strong>小红</strong></div><div style="color:#999">不知道您是否还有意向</div></div>
  </div>
  <!-- 右侧聊天区域 -->
  <div style="position:fixed;left:360px;top:0;right:0;height:100%;background:#fff">
    <div id="chat-area" style="height:calc(100% - 120px);overflow-y:auto;padding:20px">
      <div class="msg">你好，我对这个岗位感兴趣</div>
      <div class="msg self">您好，方便先了解一下您的情况吗？</div>
    </div>
    <!-- 输入区域 -->
    <div class="input-area" style="position:fixed;bottom:0;left:360px;right:0;height:120px;border-top:1px solid #ddd;display:flex;align-items:center;padding:10px">
      <div contenteditable="true" role="textbox" aria-label="输入消息" style="flex:1;min-height:40px;border:1px solid #ddd;border-radius:4px;padding:8px;outline:none"></div>
      <button style="margin-left:10px;padding:8px 20px;background:#1a73e8;color:#fff;border:none;border-radius:4px;cursor:pointer">发送</button>
    </div>
  </div>
</div>
<script>
// 模拟React的点击事件处理
document.addEventListener("click", function(e) {
  if (e.target.tagName === "BUTTON" && e.target.textContent === "发送") {
    console.log("[模拟] 发送按钮被点击");
    var input = document.querySelector("[contenteditable]");
    if (input && input.textContent.trim()) {
      console.log("[模拟] 发送消息:", input.textContent.trim());
      input.innerHTML = "";
    }
  }
});
</script>
</body>
</html>
